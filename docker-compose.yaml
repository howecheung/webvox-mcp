services:
  webvox-mcp:
    build: .
    container_name: webvox-mcp
    environment:
      - MCP_ENDPOINT=${MCP_ENDPOINT}
      - ZHIPU_API_KEY=${ZHIPU_API_KEY}
    restart: unless-stopped
    network_mode: bridge
    # ж—Ҙеҝ—йҷҗеҲ¶пјҢйҳІжӯўеҚ ж»ЎзЈҒзӣҳ
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
